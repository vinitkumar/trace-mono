# Trace Mono production build plan.
#
# The first public 1.0.0 cut used hand-rolled toy outlines. This plan replaces
# that with a proper Iosevka custom build: still a distinct Trace Mono family,
# but now built on a mature terminal-font toolchain with OFL-compatible source
# and rendering quality.

[buildPlans.TraceMonoConsole]
family = "Trace Mono Console"
spacing = "normal"
serifs = "sans"
noCvSs = false
noLigation = false
exportGlyphNames = true

[buildPlans.TraceMonoConsole.variants]
inherits = "ss09"

[buildPlans.TraceMonoConsole.variants.design]
capital-a = "straight-serifless"
capital-b = "standard-serifless"
capital-d = "more-rounded-serifless"
capital-g = "toothless-corner-serifless-hooked"
capital-i = "short-serifed"
capital-j = "serifed"
capital-k = "straight-serifless"
capital-m = "flat-bottom-serifless"
capital-q = "crossing"
capital-r = "straight-serifless"
capital-w = "straight-flat-top-serifless"
capital-y = "straight-serifless"

a = "double-storey-serifless"
b = "toothless-corner-serifless"
d = "toothed-serifless"
f = "flat-hook-serifless-crossbar-at-x-height"
g = "double-storey"
i = "serifed"
j = "serifed"
k = "straight-serifless"
l = "serifed-flat-tailed"
m = "serifless"
n = "straight-serifless"
p = "earless-corner-serifless"
q = "earless-corner-straight-serifless"
r = "hookless-serifless"
t = "flat-hook"
u = "toothed-serifless"
w = "straight-flat-top-serifless"
y = "straight-serifless"

zero = "oval-dotted"
one = "base-flat-top-serif"
two = "straight-neck-serifless"
three = "flat-top-serifless"
four = "closed-serifless"
five = "upright-flat-serifless"
six = "straight-bar"
seven = "straight-serifless"
eight = "two-circles"
nine = "straight-bar"

asterisk = "penta-low"
brace = "curly-flat-boundary"
paren = "large-contour"
caret = "medium"
dollar = "through"
ampersand = "upper-open"
at = "compact"
percent = "rings-continuous-slash"
number-sign = "slanted-open"
underscore = "high"
bar = "force-upright"
question = "corner-flat-hooked"
lig-ltgteq = "slanted"
lig-neq = "slightly-slanted-dotted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"
lig-plus-chain = "without-notch"
lig-double-arrow-bar = "with-notch"
lig-single-arrow-bar = "with-notch"

[buildPlans.TraceMonoConsole.ligations]
inherits = "default-calt"
disables = [
  "arrow-wave",
  "counter-arrow-wave",
  "html-comment",
  "trig",
  "tilde-tilde",
  "tilde-tilde-tilde",
]

[buildPlans.TraceMonoConsole.weights]
Regular = { shape = 425, menu = 400, css = 400 }
Bold = { shape = 710, menu = 700, css = 700 }

[buildPlans.TraceMonoConsole.widths]
Normal = { shape = 592, menu = 5, css = "normal" }

[buildPlans.TraceMonoConsole.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.TraceMonoConsole.metricOverride]
leading = 1170
winMetricAscenderPad = 0
winMetricDescenderPad = 0
powerlineScaleY = 1.08
powerlineScaleX = 1.0

[buildPlans.TraceMonoInspect]
family = "Trace Mono Inspect"
spacing = "normal"
serifs = "sans"
noCvSs = false
noLigation = false
exportGlyphNames = true

[buildPlans.TraceMonoInspect.variants]
inherits = "ss09"

[buildPlans.TraceMonoInspect.variants.design]
capital-a = "straight-serifless"
capital-i = "short-serifed"
capital-j = "serifed"
capital-q = "crossing"
a = "double-storey-serifless"
g = "double-storey"
i = "serifed"
j = "serifed"
l = "serifed-flat-tailed"
r = "hookless-serifless"
zero = "oval-dotted"
one = "base-flat-top-serif"
brace = "curly-flat-boundary"
paren = "large-contour"
underscore = "high"
bar = "force-upright"

[buildPlans.TraceMonoInspect.ligations]
inherits = "default-calt"
disables = [
  "arrow-wave",
  "counter-arrow-wave",
  "html-comment",
  "trig",
  "tilde-tilde",
  "tilde-tilde-tilde",
]

[buildPlans.TraceMonoInspect.weights]
Regular = { shape = 425, menu = 400, css = 400 }
Bold = { shape = 710, menu = 700, css = 700 }

[buildPlans.TraceMonoInspect.widths]
Normal = { shape = 620, menu = 5, css = "normal" }

[buildPlans.TraceMonoInspect.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.TraceMonoInspect.metricOverride]
leading = 1200
winMetricAscenderPad = 0
winMetricDescenderPad = 0
powerlineScaleY = 1.08
powerlineScaleX = 1.0
